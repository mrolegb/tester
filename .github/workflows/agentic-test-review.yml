name: Agentic Test Review

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  agentic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run agentic review script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: npm run agent:test

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-review-artifacts
          path: |
            reports/agentic-test-review.md
            tests/agent.generated.test.ts
            jest-results.json
          if-no-files-found: ignore
